# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: true

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  review_details: true
  collapse_walkthrough: true

  pre_merge_checks:
    docstrings:
      mode: "off"

  auto_review:
    enabled: true
    drafts: false
    base_branches: ["main", "develop"]

  path_instructions:
    - path: "apps/errant-tower-server/**/*.cs"
      instructions: |
        This is .NET 10.0 Controller-based API code following Domain-Driven Design patterns.

        ## Architecture
        - Enforce Domain-Driven Design structure: Entity → Repository → Service (with optional Validator) → Controller
        - Services must depend on Repository, concentrate logic and react to events
        - All layers must be loosely coupled based on Interfaces
        - Validators must separate async DB checks from sync business rules
        - Ensure proper domain event publishing after state changes
        - Flag tight coupling between layers (e.g., controllers directly using repositories)
        - Promote Locality of Behavior, simple abstractions and uni-directional data flow

        ## Controllers
        - Controllers must inherit ControllerBase and be annotated with [ApiController]
        - Use [Route("resource")] at class level following RESTful conventions (plural nouns, lowercase)
        - Enforce RESTful HTTP verb attributes: [HttpGet], [HttpPost], [HttpPut], [HttpDelete]
        - Protected controllers or actions must use [Authorize] attribute
        - Return ActionResult<T> or IActionResult for all actions
        - Use Ok(), NotFound(), BadRequest(), CreatedAtAction() etc. — not raw Results.*
        - HttpContext is available via ControllerBase — do not inject it as a parameter
        - Use constructor injection (primary constructors, C# 12) for services
        - Response mapping (Entity → DTO) must happen in the controller, not in the service
        - Verify all controllers are in a Controllers/ or Domain/*/Controller structure

        ## Registration
        - Verify all Repositories and Services are registered in Program.cs
        - Controllers are registered via AddControllers() / MapControllers() — verify both are present
        - Event handlers must be registered as IEventHandler<TEvent> in Program.cs
        - MongoDB Client should be Singleton, Database should be Singleton, Repositories/Services should be Scoped

        ## Domain & Data
        - Repository constructors must receive IMongoDatabase via DI
        - Indexes should be created in repository constructors using await (not fire-and-forget)
        - Throw ApiException with translation keys (e.g., "errors.userNotFound")
        - Ensure proper validation in Validators (or Services if validation is simple) before DB operations
        - Timestamps must be ulong (Unix timestamp milliseconds)
        - Entity IDs must be string type

        ## C# Conventions
        - Use primary constructors for DI (C# 12)
        - Use required keyword for required properties in DTOs/records
        - Prefer record for DTOs and domain events
        - Use init for immutable properties
        - Verify nullable reference types are properly annotated
        - Ensure async methods return Task or Task<T>
        - Check that cancellation tokens are passed to async methods where appropriate
        - Verify proper null handling with nullable reference types

        ## Security
        - Verify API token authentication via Authorization header
        - Ensure ownership checks are performed (authenticated user matches resource owner)
        - Ensure sensitive data is not exposed in error messages
        - Flag hardcoded secrets or connection strings

        ## Error handling
        - Logic errors must not crush the application
        - Errors must be logged for debugging

    - path: "apps/errant-tower-client/src/**/*.{ts,tsx}"
      instructions: |
        This is a React web application with TypeScript strict mode.

        ## React
        - Enforce proper React hooks usage (no conditional hooks, correct dependency arrays)
        - Heavy logic must be in custom hooks or services, not inside components
        - Flag excessive inline object/function creation in JSX that causes unnecessary re-renders
        - Verify proper cleanup in useEffect hooks (return cleanup function for subscriptions/timers)
        - Check for missing dependencies in useEffect/useCallback/useMemo
        - Flag heavy computations in render — should use useMemo
        - Check for memory leaks (unsubscribed listeners, timers, AbortController missing)
        - Verify proper handling of async operations (loading, error, success states)

        ## State Management
        - Check for proper TypeScript typing of store state and actions
        - Ensure stores are not directly mutated (use Zustand patterns)
        - Verify selectors are used to avoid unnecessary re-renders

        ## API Layer
        - API calls must be abstracted in common/api/ client classes
        - Clients must extend ApiClient base class
        - API hooks should be in api-hooks.ts following React hooks pattern
        - Verify proper error handling with ApiError class
        - Check for proper loading and error states in components
        - Ensure Authorization header uses token from user store
        - API types must be defined in common/api/api-definitions.ts

        ## Routing
        - Verify React Router conventions (route definitions in src/routes/ or src/app/)
        - Protected routes must use an auth guard component or wrapper
        - Check proper typing of route params (useParams, useSearchParams)
        - Verify navigation uses useNavigate — no direct window.location manipulation

        ## Styling
        - Styles must use theme from common/theme.ts (no hardcoded colors, spacing, or border radii)
        - No hardcoded color values in component files — use theme tokens or CSS variables
        - Check for duplicated style definitions that should be reusable

        ## Internationalization
        - Translation keys must use dot notation (e.g., errors.unknown)
        - Verify useTranslation() hook is used, not direct t() calls
        - Check that translation keys exist in en.json
        - Flag hardcoded user-facing strings

        ## TypeScript
        - Enforce TypeScript strict mode compliance
        - Use TypeScript interfaces for data structures
        - Verify proper typing of props, state, and function parameters
        - Flag any usage (should be typed properly)
        - Confirm unknown usage is intentional
        - Check for proper null/undefined handling

        ## Architecture
        - Ensure no feature-specific code leaks into common/
        - Components must be truly reusable (no feature coupling)
        - Utilities should be pure functions where possible
        - Theme must be the single source of truth for styling values
        - Config values must be defined as const in config.ts

  finishing_touches:
    docstrings:
      enabled: false

  tools:
    markdownlint:
      enabled: true

    languagetool:
      enabled: true
      level: "picky"

    shellcheck:
      enabled: true

    yamllint:
      enabled: true

    hadolint:
      enabled: true

    eslint:
      enabled: true

    biome:
      enabled: true

chat:
  auto_reply: true
